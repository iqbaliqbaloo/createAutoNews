name: News Autoposter

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    concurrency:
      group: autoposter
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── ML model cache (MiniLM + CLIP) ──────────────────────────────────
      - name: Cache ML models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v2

      # ── SQLite DB persistence ────────────────────────────────────────────
      - name: Restore database
        uses: actions/cache@v4
        with:
          path: state.db
          key: state-db-${{ github.run_id }}
          restore-keys: |
            state-db-

      # ── Pipeline state files (topic memory, queue, results) ─────────────
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: data/
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      # ── Ensure data/ always exists so cache save never fails ────────────
      - name: Create data directory
        run: mkdir -p data

      # ── System fonts ─────────────────────────────────────────────────────
      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu

      # ── Python dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run pipeline (3 attempts with backoff) ───────────────────────────
      - name: Run pipeline
        run: |
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            python main.py && break || sleep 15
          done
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:  ${{ secrets.GROQ_API_KEY_2 }}
          FB_PAGE_TOKEN:   ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IMGBB_API_KEY:   ${{ secrets.IMGBB_API_KEY }}
          FB_APP_ID:       ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:   ${{ secrets.FB_APP_SECRET }}
          TZ: Asia/Karachi

      # ── Persist DB ────────────────────────────────────────────────────────
      - name: Save database
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: state-db-${{ github.run_id }}
        continue-on-error: true

      # ── Persist pipeline state ────────────────────────────────────────────
      - name: Save pipeline state
        uses: actions/cache/save@v4
        with:
          path: data/
          key: pipeline-state-${{ github.run_id }}
        continue-on-error: true

      # ── Upload logs on failure ────────────────────────────────────────────
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autoposter-debug
          path: |
            *.log
            state.db
            data/
