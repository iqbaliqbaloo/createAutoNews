name: News Autoposter

on:
  schedule:
    - cron: '0  1 * * *'    # 06:00 AM PKT — early morning
    - cron: '0  2 * * *'    # 07:00 AM PKT — morning start
    - cron: '30 3 * * *'    # 08:30 AM PKT — morning peak
    - cron: '0  6 * * *'    # 11:00 AM PKT — late morning
    - cron: '0  7 * * *'    # 12:00 PM PKT — noon
    - cron: '0  8 * * *'    # 01:00 PM PKT — lunch peak
    - cron: '0 10 * * *'    # 03:00 PM PKT — afternoon
    - cron: '0 14 * * *'    # 07:00 PM PKT — evening peak
    - cron: '0 16 * * *'    # 09:00 PM PKT — prime time
    - cron: '0 17 * * *'    # 10:00 PM PKT — late evening
    - cron: '0 18 * * *'    # 11:00 PM PKT — night
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    concurrency:
      group: news-poster
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── ML model cache (MiniLM + CLIP) ──────────────────────────────────
      - name: Cache ML models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v2

      # ── SQLite DB persistence ────────────────────────────────────────────
      - name: Restore database
        uses: actions/cache@v4
        with:
          path: state.db
          key: post-db-${{ github.run_id }}
          restore-keys: |
            post-db-

      # ── Pipeline state files (topic memory, queue, results) ─────────────
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: data/
          key: post-state-${{ github.run_id }}
          restore-keys: |
            post-state-

      # ── Ensure data/ always exists so cache save never fails ────────────
      - name: Create data directory
        run: mkdir -p data

      # ── System fonts ─────────────────────────────────────────────────────
      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu

      # ── Python dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run pipeline (3 attempts with backoff; exit 1 on total failure) ──
      - name: Run pipeline
        run: |
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            python main.py && exit 0
            [ "$i" -lt 3 ] && sleep 15
          done
          exit 1
        env:
          MAKE_WEBHOOK_URL:    ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_URL_1:  ${{ secrets.MAKE_WEBHOOK_URL_1 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:      ${{ secrets.GROQ_API_KEY_2 }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          IMGBB_API_KEY:       ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TZ: Asia/Karachi

      # ── Notify on failure (Email only — Telegram alert goes to admin chat if configured) ──
      - name: Notify on pipeline failure
        if: failure()
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          u = os.environ.get("GMAIL_USER", "")
          p = os.environ.get("GMAIL_APP_PASSWORD", "")
          t = os.environ.get("NOTIFY_EMAIL") or u
          if not u or not p:
              exit(0)
          msg = MIMEText(
              "The VisionaryMinds Scheduled Post pipeline failed on GitHub Actions.\n\n"
              "This means the workflow itself crashed (dependency error, timeout, etc.) "
              "before or during posting.\n\n"
              "Action needed: Check GitHub Actions logs at:\n"
              "https://github.com/iqbaliqbaloo/NewAutomation/actions"
          )
          msg["Subject"] = "⚠️ [VisionaryMinds] Scheduled Post Pipeline FAILED"
          msg["From"] = u
          msg["To"] = t
          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=20) as s:
                  s.login(u, p)
                  s.sendmail(u, t, msg.as_string())
              print("Failure email sent")
          except Exception as e:
              print(f"Email failed: {e}")
          EOF
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        continue-on-error: true

      # ── Persist DB ────────────────────────────────────────────────────────
      - name: Save database
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: post-db-${{ github.run_id }}
        continue-on-error: true

      # ── Persist pipeline state ────────────────────────────────────────────
      - name: Save pipeline state
        uses: actions/cache/save@v4
        with:
          path: data/
          key: post-state-${{ github.run_id }}
        continue-on-error: true

      # ── Upload logs on failure ────────────────────────────────────────────
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autoposter-debug
          path: |
            *.log
            state.db
            data/
