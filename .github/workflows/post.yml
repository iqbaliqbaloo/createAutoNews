name: News Autoposter

on:
  schedule:
    - cron: '0 0,2,3,4,6,8,9,10,12,14,15,16,18 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: autoposter
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: sentence-transformers-minilm

      - name: Install fonts
        run: sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_TOKEN:   ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IMGBB_API_KEY:   ${{ secrets.IMGBB_API_KEY }}
          FB_APP_ID:       ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:   ${{ secrets.FB_APP_SECRET }}
          TZ: Asia/Karachi

      - name: Save database
        run: |
          git config user.name "autoposter"
          git config user.email "bot@github.com"
          git add -f state.db
          git diff --staged --quiet || git commit -m "update state"
          git push