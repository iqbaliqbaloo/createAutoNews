name: News Autoposter

on:
  schedule:
    - cron: '0 */2 * * *'   # cleaner: every 2 hours
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: autoposter
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─────────────────────────────
      # FIX 1: Stable HuggingFace cache
      # ─────────────────────────────
      - name: Cache ML models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-minilm-v1

      # ─────────────────────────────
      # FIX 2: Stable DB persistence
      # ─────────────────────────────
      - name: Restore database
        uses: actions/cache@v4
        with:
          path: state.db
          key: state-db-v1
          restore-keys: |
            state-db-

      # ─────────────────────────────
      # FIX 3: System dependencies
      # ─────────────────────────────
      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu

      # ─────────────────────────────
      # Install Python deps
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ─────────────────────────────
      # FIX 4: Safe execution with retries
      # ─────────────────────────────
      - name: Run pipeline (with retry)
        run: |
          for i in 1 2 3; do
            echo "Run attempt $i"
            python main.py && break || sleep 10
          done
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:  ${{ secrets.GROQ_API_KEY_2 }}
          FB_PAGE_TOKEN:   ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          IMGBB_API_KEY:   ${{ secrets.IMGBB_API_KEY }}
          FB_APP_ID:       ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:   ${{ secrets.FB_APP_SECRET }}
          TZ: Asia/Karachi

      # ─────────────────────────────
      # FIX 5: Save DB safely (overwrite stable key)
      # ─────────────────────────────
      - name: Save database
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: state-db-v1
        continue-on-error: true

      # ─────────────────────────────
      # FIX 6: Upload logs if failure
      # ─────────────────────────────
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autoposter-logs
          path: |
            *.log
            state.db