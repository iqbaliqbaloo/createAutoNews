name: MindBlownFacts Daily Videos

on:
  schedule:
    - cron: '0 4 * * *'    # 9AM Pakistan = Short
    - cron: '0 8 * * *'    # 1PM Pakistan = Video 1
    - cron: '0 13 * * *'   # 6PM Pakistan = Video 2
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Video type: short, video1, video2'
        required: false
        default: 'video1'

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu
          ffmpeg -version | head -1

      - name: Install packages
        run: pip install requests gtts

      - name: Create Video
        env:
          GROQ_API_KEY_1:     ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:     ${{ secrets.GROQ_API_KEY_2 }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:    ${{ secrets.PIXABAY_API_KEY }}
          VIDEO_TYPE:         ${{ github.event.inputs.video_type }}
        run: |
          echo "Starting video creation..."
          python scripts/video_maker.py
          echo "Video created!"
          ls -lh output/

      - name: Upload YouTube
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/youtube_upload.py

      - name: Post Facebook
        continue-on-error: true
        env:
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: python scripts/facebook_reel.py

      - name: Done!
        run: |
          echo "================================"
          echo "AUTOMATION COMPLETE!"
          echo "================================"