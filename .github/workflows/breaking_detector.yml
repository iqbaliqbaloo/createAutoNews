name: Breaking News Detector

# Runs every 30 minutes - only current news (< 45 min old) is considered.
# Phase 1 (lightweight, always): keyword pre-check only - no ML.
# Phase 2 (full ML, conditional): runs only when Phase 1 finds a breaking signal.
# Budget: ~1440 light runs/month x 1 min + ~30 heavy runs x 5 min = ~1590 min/month.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: news-poster
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Restore pipeline state (needed for breaking_state.json) ──────────
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: data/
          key: breaking-state-${{ github.run_id }}
          restore-keys: |
            breaking-state-

      - name: Create data directory
        run: mkdir -p data

      # â”€â”€ Phase 1: lightweight pre-check (feedparser + requests only) â”€â”€â”€â”€â”€â”€
      - name: Install light dependencies
        run: pip install -r requirements_light.txt

      - name: Pre-check (keyword scan, no ML)
        id: precheck
        run: |
          result=$(python breaking_detector.py --check-only 2>/dev/null | tail -1)
          echo "has_breaking=${result:-false}" >> "$GITHUB_OUTPUT"

      # â”€â”€ Phase 2: full pipeline â€” only runs when breaking signal found â”€â”€â”€â”€â”€
      - name: Cache ML models
        if: steps.precheck.outputs.has_breaking == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v2

      - name: Restore database
        if: steps.precheck.outputs.has_breaking == 'true'
        uses: actions/cache@v4
        with:
          path: state.db
          key: breaking-db-${{ github.run_id }}
          restore-keys: |
            breaking-db-

      - name: Install fonts
        if: steps.precheck.outputs.has_breaking == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Install full dependencies
        if: steps.precheck.outputs.has_breaking == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run breaking pipeline
        if: steps.precheck.outputs.has_breaking == 'true'
        run: python breaking_detector.py
        env:
          MAKE_WEBHOOK_URL:    ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_URL_1:  ${{ secrets.MAKE_WEBHOOK_URL_1 }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:      ${{ secrets.GROQ_API_KEY_2 }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          IMGBB_API_KEY:       ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TZ: Asia/Karachi

      # â”€â”€ Persist state (always, to keep breaking_state.json current) â”€â”€â”€â”€â”€â”€â”€
      - name: Save database
        if: steps.precheck.outputs.has_breaking == 'true'
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: breaking-db-${{ github.run_id }}
        continue-on-error: true

      - name: Save pipeline state
        uses: actions/cache/save@v4
        with:
          path: data/
          key: breaking-state-${{ github.run_id }}
        continue-on-error: true

      # â”€â”€ Email on workflow failure â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Email on failure
        if: failure()
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          u = os.environ.get("GMAIL_USER", "")
          p = os.environ.get("GMAIL_APP_PASSWORD", "")
          t = os.environ.get("NOTIFY_EMAIL") or u
          if not u or not p:
              exit(0)
          msg = MIMEText(
              "The VisionaryMinds Breaking News Detector pipeline failed on GitHub Actions.\n\n"
              "This may mean a breaking or trending story was detected but the pipeline "
              "crashed before posting it.\n\n"
              "Action needed: Check GitHub Actions logs at:\n"
              "https://github.com/iqbaliqbaloo/NewAutomation/actions"
          )
          msg["Subject"] = "⚠️ [VisionaryMinds] Breaking News Detector FAILED"
          msg["From"] = u
          msg["To"] = t
          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=20) as s:
                  s.login(u, p)
                  s.sendmail(u, t, msg.as_string())
              print("Failure email sent")
          except Exception as e:
              print(f"Email failed: {e}")
          EOF
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        continue-on-error: true
