name: Sports Tracker

# Runs every 2 hours.
# Exits in < 5 seconds (1 min billed) when no active match in sports_state.json.
# Only installs heavy deps and runs full pipeline when a LIVE match exists.
# Budget: ~356 fast exits × 1 min + ~4 live runs × 4 min ≈ 372 min/month.

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    concurrency:
      group: sports-tracker
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Restore pipeline state (needed for sports_state.json) ────────────
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: data/
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      - name: Create data directory
        run: mkdir -p data

      # ── Phase 1: check if any match is LIVE (pure Python, zero packages) ─
      - name: Check for active match
        id: matchcheck
        run: |
          python - <<'EOF'
          import json, os, sys
          path = "data/sports_state.json"
          if not os.path.exists(path):
              print("has_match=false")
          else:
              try:
                  d = json.load(open(path))
                  has = bool(d.get("active_matches"))
              except Exception:
                  has = False
              print(f"has_match={'true' if has else 'false'}")
          EOF
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import json, os
          path = "data/sports_state.json"
          if not os.path.exists(path):
              print("has_match=false")
          else:
              try:
                  d = json.load(open(path))
                  has = bool(d.get("active_matches"))
              except Exception:
                  has = False
              print(f"has_match={'true' if has else 'false'}")
          EOF

      # ── Phase 2: full pipeline — only runs when a match is active ─────────
      - name: Cache ML models
        if: steps.matchcheck.outputs.has_match == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v2

      - name: Restore database
        if: steps.matchcheck.outputs.has_match == 'true'
        uses: actions/cache@v4
        with:
          path: state.db
          key: state-db-${{ github.run_id }}
          restore-keys: |
            state-db-

      - name: Install fonts
        if: steps.matchcheck.outputs.has_match == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Install full dependencies
        if: steps.matchcheck.outputs.has_match == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sports tracker
        if: steps.matchcheck.outputs.has_match == 'true'
        run: python sports_tracker.py
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_TOKEN:             ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:                ${{ secrets.FB_PAGE_ID }}
          IG_USER_ID:                ${{ secrets.IG_USER_ID }}
          PIXABAY_API_KEY:           ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          IMGBB_API_KEY:             ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:       ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FOOTBALL_DATA_API_KEY:     ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TZ: Asia/Karachi

      - name: Save database
        if: steps.matchcheck.outputs.has_match == 'true'
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: state-db-${{ github.run_id }}
        continue-on-error: true

      - name: Save pipeline state
        uses: actions/cache/save@v4
        with:
          path: data/
          key: pipeline-state-${{ github.run_id }}
        continue-on-error: true
