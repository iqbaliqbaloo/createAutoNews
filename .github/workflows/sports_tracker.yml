я╗┐name: Sports Tracker

# Runs every 30 minutes - only current/live matches and news < 2 hours old.
# Exits in < 5 seconds (1 min billed) when no active match found.
# Only installs heavy deps and runs full pipeline when a LIVE match exists.
# Budget: ~1440 fast exits x 1 min + ~10 live runs x 4 min = ~1480 min/month.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    concurrency:
      group: news-poster
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ├втАЭтВм├втАЭтВм Restore pipeline state (needed for sports_state.json) ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
      - name: Restore pipeline state
        uses: actions/cache@v4
        with:
          path: data/
          key: pipeline-state-${{ github.run_id }}
          restore-keys: |
            pipeline-state-

      - name: Create data directory
        run: mkdir -p data

      # ├втАЭтВм├втАЭтВм Phase 1: check active matches OR discover ANY sport via "vs" pattern ├втАЭтВм
      - name: Install light dependencies
        run: pip install feedparser requests

      - name: Check for active match or discoverable match
        id: matchcheck
        run: |
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import json, os, re, requests, feedparser

          # Generic "X vs Y" pattern ├втВмтАЭ works for cricket, football, tennis, F1, etc.
          VS_PATTERN = re.compile(
              r'([A-Za-z][A-Za-z .]{2,28}?)\s+(?:vs?\.?|versus)\s+([A-Za-z][A-Za-z .]{2,28})',
              re.IGNORECASE,
          )
          IMPORTANCE_SIGNALS = [
              "final", "semifinal", "semi-final", "world cup", "champions",
              "ashes", "icc", "psl", "ipl", "live", "t20i", "odi", "grand prix",
              "test match", "asia cup", "grand slam", "won", "wins", "series",
          ]
          LIVE_SIGNALS = ["live", "score", "wicket", "goal", "race", "set", "round"]

          # 1. Check existing state file
          path = "data/sports_state.json"
          has = False
          if os.path.exists(path):
              try:
                  d = json.load(open(path))
                  has = bool(d.get("active_matches"))
              except Exception:
                  pass

          # 2. If no existing matches, scan multi-sport RSS feeds
          if not has:
              FEEDS = [
                  "https://www.espncricinfo.com/rss/content/story/feeds/0.xml",
                  "https://news.google.com/rss/search?q=sports+live+match+today&hl=en&gl=PK&ceid=PK:en",
                  "https://news.google.com/rss/search?q=cricket+football+live&hl=en&gl=PK&ceid=PK:en",
                  "https://news.google.com/rss/search?q=sports+final+world+cup&hl=en&gl=PK&ceid=PK:en",
                  "https://www.geo.tv/rss/1/0",
              ]
              for url in FEEDS:
                  try:
                      r    = requests.get(url, timeout=8, headers={"User-Agent": "Mozilla/5.0"})
                      feed = feedparser.parse(r.text)
                      for entry in feed.entries:
                          title = (getattr(entry, "title", "") or "").lower()
                          if VS_PATTERN.search(title):
                              if (any(s in title for s in IMPORTANCE_SIGNALS) or
                                      any(w in title for w in LIVE_SIGNALS)):
                                  has = True
                                  break
                  except Exception:
                      pass
                  if has:
                      break

          print(f"has_match={'true' if has else 'false'}")
          EOF

      # ├втАЭтВм├втАЭтВм Phase 2: full pipeline ├втВмтАЭ only runs when a match is active ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
      - name: Cache ML models
        if: steps.matchcheck.outputs.has_match == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v2

      - name: Restore database
        if: steps.matchcheck.outputs.has_match == 'true'
        uses: actions/cache@v4
        with:
          path: state.db
          key: state-db-${{ github.run_id }}
          restore-keys: |
            state-db-

      - name: Install fonts
        if: steps.matchcheck.outputs.has_match == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Install full dependencies
        if: steps.matchcheck.outputs.has_match == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sports tracker
        if: steps.matchcheck.outputs.has_match == 'true'
        run: python sports_tracker.py
        env:
          MAKE_WEBHOOK_URL:   ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_URL_1: ${{ secrets.MAKE_WEBHOOK_URL_1 }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:     ${{ secrets.GROQ_API_KEY_2 }}
          PIXABAY_API_KEY:           ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          IMGBB_API_KEY:             ${{ secrets.IMGBB_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:       ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FOOTBALL_DATA_API_KEY:     ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TZ: Asia/Karachi

      - name: Save database
        if: steps.matchcheck.outputs.has_match == 'true'
        uses: actions/cache/save@v4
        with:
          path: state.db
          key: state-db-${{ github.run_id }}
        continue-on-error: true

      - name: Save pipeline state
        uses: actions/cache/save@v4
        with:
          path: data/
          key: pipeline-state-${{ github.run_id }}
        continue-on-error: true

      # ├втАЭтВм├втАЭтВм Email on workflow failure ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
      - name: Email on failure
        if: failure()
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          u = os.environ.get("GMAIL_USER", "")
          p = os.environ.get("GMAIL_APP_PASSWORD", "")
          t = os.environ.get("NOTIFY_EMAIL") or u
          if not u or not p:
              exit(0)
          msg = MIMEText(
              "The VisionaryMinds Sports Tracker pipeline failed on GitHub Actions.\n\n"
              "A sports match may have been detected but the pipeline crashed before posting.\n\n"
              "Action needed: Check GitHub Actions logs at:\n"
              "https://github.com/iqbaliqbaloo/NewAutomation/actions"
          )
          msg["Subject"] = "├в┼б┬а├п┬╕┬П [VisionaryMinds] Sports Tracker FAILED"
          msg["From"] = u
          msg["To"] = t
          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=20) as s:
                  s.login(u, p)
                  s.sendmail(u, t, msg.as_string())
              print("Failure email sent")
          except Exception as e:
              print(f"Email failed: {e}")
          EOF
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        continue-on-error: true
